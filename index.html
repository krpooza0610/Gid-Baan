<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gid-Baan</title>
    
    <!-- บังคับให้แสดงผลแบบ Fullscreen สำหรับ Android/iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- ลิงก์ไปยังไฟล์ Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- ปรับแต่งสีและมิติสไตล์มินิมอล (Minimal Soft Light) --- */
        :root {
            --bg-main: #f2f4f7;       /* ปรับพื้นหลังรอบนอกให้เทาอมฟ้าอ่อน ๆ เพื่อขับให้กล่องโพสต์เด่นขึ้น */
            --card-bg: #ffffff;       /* กล่องโพสต์ขาวบริสุทธิ์ */
            --text-main: #111111;     /* ตัวหนังสือเข้มเด่นชัด */
            --text-dim: #7f8c8d;      /* ตัวหนังสือสีจางสำหรับ @username และสถิติ */
            --primary: #2c3e50;       /* สีน้ำเงินเข้มหรู ๆ สำหรับปุ่มหลัก */
            --accent: #5ccbb0;        /* สีเขียวพาสเทลยอดฮิตแบบปุ่มบวกในรูป */
            --border-color: #e9ecef;  /* เส้นขอบจาง ๆ ดูสะอาดตา */
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Chakra Petch', sans-serif; 
        }

        body { 
            background: var(--bg-main); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex;
            justify-content: center;
            background-image: radial-gradient(#e3e7ed 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* จำลองหน้าจอมือถือตรงกลาง */
        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--bg-main);
            min-height: 100vh;
            position: relative;
            padding-bottom: 90px;
        }

        /* --- 2. Header ส่วนบน --- */
        .main-header {
            position: fixed;
            top: 0;
            width: 100%;
            max-width: 480px;
            height: 70px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .header-icons {
            display: flex;
            gap: 15px;
            font-size: 20px;
            cursor: pointer;
        }

        /* --- 3. การจัดการหน้า (Pages) --- */
        .page {
            padding: 90px 20px 20px 20px;
            display: none;
        }

        .page.active {
            display: block;
        }

        .page-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* --- 4. ดีไซน์ฟีดโพสต์ (Post Cards) --- */
        .post-card {
            background: var(--card-bg);
            border-radius: 20px;       
            padding: 18px;
            margin-bottom: 18px;
            box-shadow: 0 8px 24px rgba(149, 157, 165, 0.15); 
            border: 1px solid rgba(0, 0, 0, 0.02);
            transition: transform 0.2s ease;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .avatar-placeholder {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #eee;
        }

        .author-name {
            font-weight: 500;
            font-size: 14px;
        }

        .post-content {
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .post-img {
            width: 100%;
            border-radius: 12px;
            object-fit: cover;
            max-height: 250px;
            margin-bottom: 12px;
        }

        .post-actions {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: var(--text-dim);
            border-top: 1px solid #f5f5f5;
            padding-top: 10px;
        }

        .action-item {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* --- 5. ดีไซน์หน้าแชทสด --- */
        .chat-container {
            height: 55vh;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-bubble {
            background: #f1f3f5;
            padding: 10px 14px;
            border-radius: 14px;
            max-width: 80%;
            font-size: 14px;
            align-self: flex-start;
        }

        .chat-input-zone {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            outline: none;
            font-size: 14px;
        }

        /* --- 6. ดีไซน์หน้าต่างเขียนโพสต์ --- */
        .post-textarea {
            width: 100%;
            height: 120px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            outline: none;
            resize: none;
            font-size: 15px;
            margin-bottom: 15px;
        }

        .submit-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 24px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
        }

        /* --- 7. เมนูบาร์ด้านล่าง (Floating Bottom Nav) --- */
        .nav-bar {
            position: fixed;
            bottom: 20px;
            width: calc(100% - 40px);
            max-width: 440px;
            height: 65px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.5);
            z-index: 1000;
        }

        .nav-item {
            text-align: center;
            color: var(--text-dim);
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
        }

        .nav-item.active {
            color: var(--primary);
            font-weight: 700;
        }

        .nav-icon {
            font-size: 20px;
            margin-bottom: 2px;
        }

        .nav-center-btn {
            width: 52px;
            height: 52px;
            background: var(--accent);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 300;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(108, 209, 180, 0.4);
            transition: 0.2s;
            margin-top: -5px;
        }

        .nav-center-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
